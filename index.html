<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="javascript.js" defer></script>
  </head>

  <body>
    <div class="header">
      <div class="title">Calculator</div>
    </div>
    <div class="content">
      <div class="calculator">
        <div class="screen">
          <div class="display">
            <div class="numbers">0</div>
          </div>
        </div>
        <div class="buttonsZone">
          <div class="buttonsContainer">
            <button class="buttons ac">AC</button>
            <button class="buttons backspace">
              <div>←</div>
            </button>
            <button class="buttons">+/-</button>
            <button class="buttons">÷</button>
            <button class="buttons">1</button>
            <button class="buttons">2</button>
            <button class="buttons">3</button>
            <button class="buttons">x</button>
            <button class="buttons">4</button>
            <button class="buttons">5</button>
            <button class="buttons">6</button>
            <button class="buttons">+</button>
            <button class="buttons">7</button>
            <button class="buttons">8</button>
            <button class="buttons">9</button>
            <button class="buttons">-</button>
            <button class="buttons">0</button>
            <button class="buttons point">.</button>
            <button class="buttons equal">
              <div>=</div>
            </button>
          </div> 
        </div>   
      </div>
    </div>
    <div class="footer">
      <div class="footerText">Designed by Luis327 - Student of The Odin Project
      </div> 
    </div>
  </body>

</html>
